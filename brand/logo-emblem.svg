<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" width="320" height="400" role="img" aria-label="Blades and Ash Studio emblem">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4E0A6"/>
      <stop offset="0.28" stop-color="#DCBB6C"/>
      <stop offset="0.5" stop-color="#C8A24B"/>
      <stop offset="0.72" stop-color="#9A7531"/>
      <stop offset="1" stop-color="#C8A24B"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6E6B4"/>
      <stop offset="1" stop-color="#8A6A2C"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <!-- ── Smoke / ash wisps (behind, accentuated) ── -->
  <g stroke="url(#gold)" fill="none" stroke-linecap="round" filter="url(#soft)">
    <!-- central column -->
    <path d="M160 300 C148 250 178 224 160 176 C148 144 176 120 160 70 C154 50 166 36 160 18" stroke-width="3" opacity="0.55"/>
    <!-- broad outer curls -->
    <path d="M118 300 C96 258 84 226 100 188 C112 160 88 138 102 104 C108 86 96 70 104 50" stroke-width="2.4" opacity="0.42"/>
    <path d="M202 300 C224 258 236 226 220 188 C208 160 232 138 218 104 C212 86 224 70 216 50" stroke-width="2.4" opacity="0.42"/>
    <!-- fine inner threads -->
    <path d="M140 250 C130 220 146 198 136 168 C130 150 144 132 138 110" stroke-width="1.4" opacity="0.6"/>
    <path d="M180 250 C190 220 174 198 184 168 C190 150 176 132 182 110" stroke-width="1.4" opacity="0.6"/>
    <!-- drifting wisps off the tips -->
    <path d="M150 80 C130 64 120 44 134 30" stroke-width="1.6" opacity="0.5"/>
    <path d="M170 80 C190 64 200 44 186 30" stroke-width="1.6" opacity="0.5"/>
  </g>

  <!-- ── Symmetric filigree flourish (top) ── -->
  <g stroke="url(#gold)" fill="none" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <g id="flourish-top">
      <path d="M160 60 C130 46 96 50 78 68 C66 80 70 96 86 96 C98 96 100 84 90 82"/>
      <path d="M120 64 C108 58 96 62 96 72"/>
    </g>
    <use href="#flourish-top" transform="matrix(-1 0 0 1 320 0)"/>
  </g>

  <!-- ── Crossed shears ── -->
  <!-- One half defined, then mirrored for perfect symmetry -->
  <g id="shear-half" stroke="url(#goldEdge)" stroke-width="1.4" stroke-linejoin="round">
    <!-- Finger ring (top-left) -->
    <circle cx="112" cy="92" r="22" fill="none" stroke="url(#gold)" stroke-width="9"/>
    <circle cx="112" cy="92" r="22" fill="none" stroke="#7A5C26" stroke-width="1.2" opacity="0.6"/>
    <!-- Shank + blade: ring -> pivot -> tip (crossing to lower right) -->
    <path d="M124 110
             C 136 128, 146 140, 152 152
             C 162 176, 176 212, 188 256
             L 196 258
             C 182 214, 168 178, 160 154
             C 152 138, 140 120, 132 104 Z"
          fill="url(#gold)"/>
    <!-- Blade highlight -->
    <path d="M150 156 C160 182, 174 216, 185 252" fill="none" stroke="#F6E6B4" stroke-width="1.6" opacity="0.55" stroke-linecap="round"/>
  </g>
  <use href="#shear-half" transform="matrix(-1 0 0 1 320 0)"/>

  <!-- Pivot bolt -->
  <circle cx="160" cy="152" r="8" fill="url(#gold)" stroke="#7A5C26" stroke-width="1.4"/>
  <circle cx="160" cy="152" r="2.6" fill="#6E521F"/>

  <!-- ── Wordmark ── -->
  <text x="160" y="318" text-anchor="middle"
        font-family="Cormorant, Georgia, serif" font-weight="600" font-size="46"
        letter-spacing="3" fill="url(#gold)">BLADES <tspan font-style="italic" font-weight="500">&amp;</tspan> ASH</text>
  <text x="160" y="348" text-anchor="middle"
        font-family="Jost, sans-serif" font-weight="400" font-size="15"
        letter-spacing="14" fill="#C8A24B">STUDIO</text>

  <!-- ── Bottom flourish ── -->
  <g stroke="url(#gold)" fill="none" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <g id="flourish-bot">
      <path d="M160 366 C132 366 104 360 88 372 C78 379 82 390 94 386 C102 383 100 374 92 376"/>
    </g>
    <use href="#flourish-bot" transform="matrix(-1 0 0 1 320 0)"/>
    <circle cx="160" cy="366" r="2.4" fill="url(#gold)" stroke="none"/>
  </g>
</svg>
