<?xml version="1.0" encoding="UTF-8"?>
<!-- Blades & Ash Studio — Social Template 06: New Service Announcement.
     EDITABLE: all <text>/<tspan> copy can be changed in Canva (Upload > import this SVG).
     NOTE: Canva may SUBSTITUTE the fonts (Cormorant / Jost). Install or re-select them to match. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap');
      .display { font-family: 'Cormorant', serif; fill: #EDE7DB; }
      .ital { font-family: 'Cormorant', serif; font-style: italic; }
      .label { font-family: 'Jost', sans-serif; }
      .gold { fill: #C8A24B; }
      .bone { fill: #EDE7DB; }
      .muted { fill: #9A938A; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1080" height="1080" fill="#0E0E10"/>
  <rect x="0" y="0" width="1080" height="1080" fill="none" stroke="#C8A24B" stroke-width="2" opacity="0.3" transform="translate(0,0)"/>
  <rect x="60" y="60" width="960" height="960" fill="none" stroke="#C8A24B" stroke-width="1" opacity="0.4"/>

  <!-- Mark prominent, top-center -->
  <g transform="translate(490,130) scale(0.95)">
    <path d="M50 4 C42 -5 60 -9 49 -16" fill="none" stroke="#C8A24B" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M50 5 C58 -1 47 -4 54 -12" fill="none" stroke="#C8A24B" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M63 2 C 55 18, 50 28, 47 39 C 41 60, 33 77, 23 90 L 30 91 C 41 77, 50 60, 54 40 C 57 28, 61 14, 63 2 Z" fill="#C8A24B"/>
    <g transform="matrix(-1 0 0 1 100 0)">
      <path d="M63 2 C 55 18, 50 28, 47 39 C 41 60, 33 77, 23 90 L 30 91 C 41 77, 50 60, 54 40 C 57 28, 61 14, 63 2 Z" fill="#C8A24B"/>
    </g>
    <path d="M35 60 Q50 65 65 60" fill="none" stroke="#C8A24B" stroke-width="4.6" stroke-linecap="round"/>
    <circle cx="50" cy="36" r="3.8" fill="#0E0E10" stroke="#C8A24B" stroke-width="2.4"/>
    <circle cx="24" cy="92" r="6.5" fill="none" stroke="#C8A24B" stroke-width="3"/>
    <circle cx="76" cy="92" r="6.5" fill="none" stroke="#C8A24B" stroke-width="3"/>
  </g>

  <!-- Eyebrow -->
  <text x="540" y="380" text-anchor="middle" class="label gold" font-size="28" font-weight="500" letter-spacing="14">NOW OFFERING</text>

  <!-- Service name -->
  <text x="540" y="540" text-anchor="middle" class="display bone" font-size="130" font-weight="600">Gloss &amp; Glaze</text>
  <text x="540" y="650" text-anchor="middle" class="ital gold" font-size="80" font-weight="500">Shine Treatment</text>

  <!-- Hairlines flanking -->
  <line x1="300" y1="710" x2="430" y2="710" stroke="#C8A24B" stroke-width="1"/>
  <line x1="650" y1="710" x2="780" y2="710" stroke="#C8A24B" stroke-width="1"/>

  <!-- Description -->
  <text x="540" y="790" text-anchor="middle" class="label bone" font-size="30" font-weight="300">A 30-minute treatment that revives</text>
  <text x="540" y="835" text-anchor="middle" class="label bone" font-size="30" font-weight="300">colour and seals in mirror-bright shine.</text>

  <!-- CTA -->
  <text x="540" y="915" text-anchor="middle" class="label gold" font-size="26" letter-spacing="6">BOOK AT bladeandash.com</text>

  <!-- Footer text -->
  <text x="540" y="985" text-anchor="middle" class="label muted" font-size="17" letter-spacing="6">BLADES &amp; ASH STUDIO</text>
</svg>
